<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nape Notify Overlay</title>
    <script type="module" src="./overlay.ts"></script>
  </head>
  <body>
    <main id="notice" class="notice" aria-live="polite">
      <div class="layer" id="layer">-</div>
      <div class="device-preview" aria-hidden="true">
        <svg id="device" class="device" viewBox="0 0 96 96" role="img">
          <path class="device-body" d="M31 11h38c10 0 18 8 18 18v39c0 10-8 18-18 18H31c-10 0-18-8-18-18V29c0-10 8-18 18-18Z" />
          <path class="device-top" d="M31 17h38c7 0 12 5 12 12v9H19v-9c0-7 5-12 12-12Z" />
          <circle class="device-ball" cx="48" cy="51" r="16" />
          <path class="device-ball-shine" d="M39 43c3-5 10-7 16-4" />
          <rect class="device-button" x="24" y="23" width="13" height="11" rx="3" />
          <rect class="device-button" x="42" y="23" width="13" height="11" rx="3" />
          <rect class="device-button" x="60" y="23" width="13" height="11" rx="3" />
          <path class="device-nose" d="M43 8h10l-5-6Z" />
        </svg>
      </div>
      <div class="copy">
        <div class="title" id="title">Layer -</div>
        <div class="subtitle" id="subtitle">Angle -</div>
      </div>
    </main>
  </body>
</html>
